application:
  name: familie-ef-soknad-api
server:
  port: 8000
  servlet:
    context-path: /familie/alene-med-barn/soknad-api

regelverk:
  alder:
    maks: 18
health:
  indicator:
    detailed: true

funksjonsbrytere:
  enabled: true
  unleash:
    uri: https://unleash.nais.io/api/
    environment: ${NAIS_CLUSTER_NAME:}
    applicationName: ${NAIS_APP_NAME:}

management:
  endpoint:
    health:
      show-details: always
      enabled: true
  endpoints.web:
    exposure.include: info, health, metrics, prometheus
    base-path: "/internal"
    path-mapping:
      info: "status/isAlive"
  metrics:
    export:
      prometheus:
        enabled: true
    web:
      server:
        request:
          autotime:
            enabled: true

cors:
  allowed_origins:
    - "https://www.nav.no/familie/alene-med-barn/soknad"
    - "https://www.nav.no/familie/alene-med-barn/soknad-api"

no.nav.security.jwt:
  issuer.selvbetjening:
    discoveryurl: ${LOGINSERVICE_IDPORTEN_DISCOVERY_URL}
    accepted_audience: ${LOGINSERVICE_IDPORTEN_AUDIENCE}
    proxyurl: http://webproxy-nais.nav.no:8088
    cookie_name: selvbetjening-idtoken
  client.registration:
    mottak-clientcredentials:
      resource-url: ${familie.ef.mottak.uri}
      well-known-url: ${TOKEN_X_WELL_KNOWN_URL}
      grant-type: urn:ietf:params:oauth:grant-type:token-exchange
      token-exchange:
        audience: ${MOTTAK_SCOPE}
      authentication:
        client-id: ${TOKEN_X_CLIENT_ID}
        client-auth-method: private_key_jwt
        client-jwk: ${TOKEN_X_PRIVATE_JWK}
    pdl-clientcredentials:
      resource-url: ${PDL_URL}
      token-endpoint-url: ${AZUREAD_TOKEN_ENDPOINT_URL}
      grant-type: client_credentials
      scope: ${PDL_SCOPE}
      authentication:
        client-id: ${AZURE_APP_CLIENT_ID}
        client-secret: ${AZURE_APP_CLIENT_SECRET}
        client-auth-method: client_secret_basic

familie:
  ef.mottak.uri: https://familie-ef-mottak.prod-fss-pub.nais.io/api
  dokument.uri: http://familie-dokument/api
  integrasjoner.uri: https://familie-integrasjoner.prod-fss-pub.nais.io/api

PDL_URL: https://pdl-api.prod-fss-pub.nais.io
PDL_SCOPE: api://prod-fss.pdl.pdl-api/.default

MOTTAK_SCOPE: prod-fss:teamfamilie:familie-ef-mottak
